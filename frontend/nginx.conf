# SPA fallback: react-router needs deep links (/monitor, /analyze, ...) to
# resolve to the same index.html regardless of path; nginx returns 404 by
# default for client-side routes if we don't `try_files` to index.html.

server {
    listen 80;
    server_name _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache hashed assets.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Everything else falls back to the SPA entry.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
